<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Checkout | AVELINE</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-[#f8f5f1]">

  <!-- NAVBAR -->

  <nav class="flex justify-between items-center px-8 py-6 bg-white shadow-sm">

    <h1 class="text-3xl font-bold">
      AVELINE
    </h1>

    <ul class="flex gap-10 text-lg">
      <li><a href="index.html">Home</a></li>
      <li><a href="collections.html">Collections</a></li>
      <li><a href="about.html">About</a></li>
    </ul>

  </nav>

  <!-- CHECKOUT SECTION -->

  <section class="px-8 md:px-16 py-20">

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-16">

      <!-- DELIVERY FORM -->

      <div class="bg-white p-10 rounded-3xl shadow-xl">

        <h2 class="text-4xl font-bold mb-10">
          Delivery Details
        </h2>

        <form id="checkout-form" class="space-y-6">

          <!-- NAME -->

          <div>

            <label class="block mb-2 font-medium">
              Full Name
            </label>

            <input
            type="text"
            required
            class="w-full border border-gray-300 p-4 rounded-xl outline-none">

          </div>

          <!-- PHONE -->

          <div>

            <label class="block mb-2 font-medium">
              Phone Number
            </label>

            <input
            type="tel"
            required
            class="w-full border border-gray-300 p-4 rounded-xl outline-none">

          </div>

          <!-- EMAIL -->

          <div>

            <label class="block mb-2 font-medium">
              Email Address
            </label>

            <input
            type="email"
            required
            class="w-full border border-gray-300 p-4 rounded-xl outline-none">

          </div>

          <!-- ADDRESS -->

          <div>

            <label class="block mb-2 font-medium">
              Delivery Address
            </label>

            <textarea
            rows="4"
            required
            class="w-full border border-gray-300 p-4 rounded-xl outline-none"></textarea>

          </div>

          <!-- CITY -->

          <div>

            <label class="block mb-2 font-medium">
              City
            </label>

            <input
            type="text"
            required
            class="w-full border border-gray-300 p-4 rounded-xl outline-none">

          </div>

          <!-- PINCODE -->

          <div>

            <label class="block mb-2 font-medium">
              Pincode
            </label>

            <input
            type="text"
            required
            class="w-full border border-gray-300 p-4 rounded-xl outline-none">

          </div>

          <!-- PAYMENT -->

          <div>

            <label class="block mb-2 font-medium">
              Payment Method
            </label>

            <select
            class="w-full border border-gray-300 p-4 rounded-xl outline-none">

              <option>
                Cash on Delivery
              </option>

              <option>
                Credit Card
              </option>

              <option>
                UPI
              </option>

            </select>

          </div>

          <!-- BUTTON -->

          <button
          type="submit"
          class="w-full bg-black text-white py-5 rounded-xl text-lg hover:scale-[1.02] transition">

            Place Order

          </button>

        </form>

      </div>

      <!-- ORDER SUMMARY -->

      <div class="bg-white p-10 rounded-3xl shadow-xl h-fit">

        <h2 class="text-4xl font-bold mb-10">
          Order Summary
        </h2>

        <div id="checkout-items" class="space-y-6">

        </div>

        <!-- TOTAL -->

        <div class="border-t pt-6 mt-8 flex justify-between items-center">

          <h3 class="text-2xl font-bold">
            Total
          </h3>

          <h3 id="total-price" class="text-2xl font-bold">
            ₹0
          </h3>

        </div>

      </div>

    </div>

  </section>

  <!-- FOOTER -->

  <footer class="bg-black text-white py-16 mt-20">

    <div class="max-w-7xl mx-auto px-8 grid grid-cols-1 md:grid-cols-3 gap-10">

      <div>

        <h2 class="text-3xl font-bold mb-4">
          AVELINE
        </h2>

        <p class="text-gray-400 leading-7">
          Luxury fashion crafted for modern women who embrace elegance and individuality.
        </p>

      </div>

      <div>

        <h3 class="text-xl font-semibold mb-4">
          Quick Links
        </h3>

        <ul class="space-y-3 text-gray-400">
          <li><a href="index.html">Home</a></li>
          <li><a href="collections.html">Collections</a></li>
          <li><a href="about.html">About</a></li>
        </ul>

      </div>

      <div>

        <h3 class="text-xl font-semibold mb-4">
          Contact
        </h3>

        <p class="text-gray-400">
          hello@aveline.com
        </p>

        <p class="text-gray-400 mt-2">
          +91 98765 43210
        </p>

      </div>

    </div>

  </footer>

  <!-- SCRIPT -->

  <script>

    const cart = JSON.parse(localStorage.getItem('avelineCart')) || []

    const checkoutItems = document.getElementById('checkout-items')

    const totalPrice = document.getElementById('total-price')

    let total = 0

    if(cart.length === 0){

      checkoutItems.innerHTML = `

        <p class="text-gray-500">
          Your cart is empty
        </p>

      `

    } else {

      cart.forEach(item => {

        const price = parseInt(item.price.replace(/[₹,]/g, ''))

        total += price * item.quantity

        const div = document.createElement('div')

        div.className = 'border-b pb-4'

        div.innerHTML = `

          <h3 class="text-xl font-semibold">
            ${item.name}
          </h3>

          <p class="text-gray-500 mt-1">
            ${item.price}
          </p>

          <p class="text-sm text-gray-400 mt-1">
            Size: ${item.size}
          </p>

          <p class="text-sm text-gray-400 mt-1">
            Quantity: ${item.quantity}
          </p>

        `

        checkoutItems.appendChild(div)

      })

    }

    totalPrice.innerText = `₹${total.toLocaleString()}`

    // PLACE ORDER

    document.getElementById('checkout-form').addEventListener('submit', function(e){

      e.preventDefault()

      alert('Order placed successfully!')

      localStorage.removeItem('avelineCart')

      window.location.href = 'index.html'

    })

  </script>

</body>
</html>
